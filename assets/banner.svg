<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" width="100%" preserveAspectRatio="xMidYMid meet" role="img" aria-label="APOHARA · THEMIS — AP invoice fraud detection with regulator-grade evidence">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="50%" stop-color="#11182a"/>
      <stop offset="100%" stop-color="#0a0e1a"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d4a017"/>
      <stop offset="50%" stop-color="#f0c93f"/>
      <stop offset="100%" stop-color="#d4a017"/>
    </linearGradient>
    <linearGradient id="halt" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#dc2626"/>
      <stop offset="100%" stop-color="#7f1d1d"/>
    </linearGradient>
    <linearGradient id="approve" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#065f46"/>
    </linearGradient>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f0c93f" stop-opacity="0.35"/>
      <stop offset="60%" stop-color="#d4a017" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#0a0e1a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="320" fill="url(#bg)"/>

  <!-- Gold halos behind the scales -->
  <circle cx="640" cy="160" r="220" fill="url(#halo)"/>

  <!-- Decorative grid (subtle) -->
  <g stroke="#d4a017" stroke-opacity="0.06" stroke-width="1">
    <line x1="0" y1="80" x2="1280" y2="80"/>
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="240" x2="1280" y2="240"/>
    <line x1="320" y1="0" x2="320" y2="320"/>
    <line x1="640" y1="0" x2="640" y2="320"/>
    <line x1="960" y1="0" x2="960" y2="320"/>
  </g>

  <!-- The Scales of Themis (centerpiece) -->
  <g transform="translate(640 145)">
    <!-- Pillar -->
    <rect x="-3" y="-60" width="6" height="120" fill="url(#gold)"/>
    <!-- Base -->
    <rect x="-30" y="60" width="60" height="6" fill="url(#gold)"/>
    <polygon points="-30,66 30,66 24,76 -24,76" fill="url(#gold)"/>
    <!-- Crossbeam -->
    <rect x="-110" y="-58" width="220" height="4" fill="url(#gold)"/>
    <!-- Left pan (HALT) -->
    <line x1="-90" y1="-55" x2="-90" y2="-30" stroke="url(#gold)" stroke-width="2"/>
    <path d="M -130 -30 L -50 -30 L -65 -5 L -115 -5 Z" fill="url(#halt)" stroke="#d4a017" stroke-width="1.5"/>
    <text x="-90" y="-12" font-family="ui-monospace, 'SF Mono', monospace" font-size="9" font-weight="700" fill="#f9fafb" text-anchor="middle">HALT</text>
    <!-- Right pan (APPROVE) -->
    <line x1="90" y1="-55" x2="90" y2="-30" stroke="url(#gold)" stroke-width="2"/>
    <path d="M 50 -30 L 130 -30 L 115 -5 L 65 -5 Z" fill="url(#approve)" stroke="#d4a017" stroke-width="1.5"/>
    <text x="90" y="-12" font-family="ui-monospace, 'SF Mono', monospace" font-size="9" font-weight="700" fill="#f9fafb" text-anchor="middle">APPROVE</text>
    <!-- Top ornament -->
    <circle cx="0" cy="-64" r="6" fill="url(#gold)"/>
    <text x="0" y="-90" font-family="ui-serif, Georgia, serif" font-size="20" font-weight="700" fill="url(#gold)" text-anchor="middle" font-style="italic">Θ</text>
  </g>

  <!-- Top: 5 agent dots, left to right, with halos -->
  <g transform="translate(160 65)">
    <text x="0" y="0" font-family="ui-monospace, 'SF Mono', monospace" font-size="10" font-weight="700" fill="#d4a017" letter-spacing="2">5-AGENT PIPELINE</text>
    <line x1="0" y1="10" x2="180" y2="10" stroke="#d4a017" stroke-opacity="0.4" stroke-width="1"/>
  </g>

  <!-- Bottom: stats strip -->
  <g transform="translate(80 245)">
    <text x="0" y="0" font-family="ui-monospace, 'SF Mono', monospace" font-size="11" font-weight="700" fill="#d4a017" letter-spacing="2">5</text>
    <text x="0" y="14" font-family="ui-monospace, 'SF Mono', monospace" font-size="9" fill="#9ca3af" letter-spacing="1">FRAMEWORKS</text>
    <text x="0" y="26" font-family="ui-monospace, 'SF Mono', monospace" font-size="8" fill="#6b7280" letter-spacing="0.5">DORA · EU AI Act · NIST · OWASP · ACS</text>

    <text x="280" y="0" font-family="ui-monospace, 'SF Mono', monospace" font-size="11" font-weight="700" fill="#d4a017" letter-spacing="2">5</text>
    <text x="280" y="14" font-family="ui-monospace, 'SF Mono', monospace" font-size="9" fill="#9ca3af" letter-spacing="1">AGENTS</text>
    <text x="280" y="26" font-family="ui-monospace, 'SF Mono', monospace" font-size="8" fill="#6b7280" letter-spacing="0.5">Ext · PO · Fraud · GAAP · Sign</text>

    <text x="560" y="0" font-family="ui-monospace, 'SF Mono', monospace" font-size="11" font-weight="700" fill="#d4a017" letter-spacing="2">2</text>
    <text x="560" y="14" font-family="ui-monospace, 'SF Mono', monospace" font-size="9" fill="#9ca3af" letter-spacing="1">TENANTS</text>
    <text x="560" y="26" font-family="ui-monospace, 'SF Mono', monospace" font-size="8" fill="#6b7280" letter-spacing="0.5">Stark · Wayne</text>

    <text x="840" y="0" font-family="ui-monospace, 'SF Mono', monospace" font-size="11" font-weight="700" fill="#d4a017" letter-spacing="2">&lt;30s</text>
    <text x="840" y="14" font-family="ui-monospace, 'SF Mono', monospace" font-size="9" fill="#9ca3af" letter-spacing="1">VERIFY</text>
    <text x="840" y="26" font-family="ui-monospace, 'SF Mono', monospace" font-size="8" fill="#6b7280" letter-spacing="0.5">Ed25519 + BLAKE3 + RFC3161</text>

    <text x="1120" y="0" font-family="ui-monospace, 'SF Mono', monospace" font-size="11" font-weight="700" fill="#d4a017" letter-spacing="2">311</text>
    <text x="1120" y="14" font-family="ui-monospace, 'SF Mono', monospace" font-size="9" fill="#9ca3af" letter-spacing="1">TESTS</text>
    <text x="1120" y="26" font-family="ui-monospace, 'SF Mono', monospace" font-size="8" fill="#6b7280" letter-spacing="0.5">all green · 0 failures</text>
  </g>

  <!-- Right margin: stacked tag pills -->
  <g transform="translate(1050 25)" font-family="ui-monospace, 'SF Mono', monospace" font-size="9">
    <rect x="0" y="0" width="200" height="18" rx="3" fill="#d4a017" fill-opacity="0.12" stroke="#d4a017" stroke-opacity="0.4"/>
    <text x="100" y="12" fill="#d4a017" text-anchor="middle" font-weight="700" letter-spacing="1">BAND OF AGENTS · 2026</text>
    <rect x="0" y="22" width="200" height="18" rx="3" fill="#10b981" fill-opacity="0.12" stroke="#10b981" stroke-opacity="0.4"/>
    <text x="100" y="34" fill="#10b981" text-anchor="middle" font-weight="700" letter-spacing="1">LIVE @ themis.apohara.dev</text>
  </g>
</svg>
