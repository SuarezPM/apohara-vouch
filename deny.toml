# cargo-deny configuration for Apohara VOUCH.
# https://embarkstudios.github.io/cargo-deny/
#
# R11/US-X02 hardening: enforce no banned licenses, no copyleft,
# no duplicate crates, no yanked crates, no advisories on our dep
# set. The pre-commit hook (scripts/install-pre-commit.sh) runs
# `cargo deny check` before every commit.
#
# Run manually: `cargo deny check`
# Generate the baseline: `cargo deny check > docs/audit/cargo-deny-baseline.txt`

[graph]
all-features = false

[advisories]
# Empty db-version = use the bundled db (offline). The first run
# will fetch the latest; subsequent runs are fast.
db-path = "~/.cargo/advisory-db"
yanked = "warn"
ignore = [
  # RUSTSEC-2023-0071 — Marvin attack (RSA timing sidechannel) in
  # rsa v0.9.10, transitively via c2pa v0.85.2 -> apohara-sealchain-core
  # -> themis-evidence. RustCrypto: "No safe upgrade is available" jun 2026.
  #
  # Threat-model analysis: VOUCH verification is offline — verifier runs
  # locally on operator's machine, attacker has no remote timing channel.
  # The Marvin attack requires observing decryption timing on the same
  # machine with the private key. Ed25519 + BLAKE3 + RFC 3161 doesn't use
  # RSA for signing; c2pa pulls rsa only for legacy X.509 chain validation
  # that VOUCH doesn't exercise at verify time (Rekor v2 + transparency
  # log does the chain validation).
  #
  # Tracked for removal: when c2pa-rs ships non-rsa chain validator
  # (q3 2026 ETA), drop the dep and remove this ignore. See issue #47.
  "RUSTSEC-2023-0071",
  # RUSTSEC-2024-0370 — proc-macro-error v1.0.4 is unmaintained (no commits
  # for 2 years, no releases for 4). Pulled in transitively via
  # static-regular-grammar v2.0.2. "No safe upgrade is available" jun 2026.
  #
  # Threat-model analysis: proc-macro-error is a *build-time* dependency
  # only — it never ships in the vouch-verify binary. An unmaintained
  # build-time crate cannot affect runtime signing, verification, or
  # Ed25519/BLAKE3 chain integrity.
  #
  # Tracked for removal: depends on proc-macro2 ecosystem cleanup.
  "RUSTSEC-2024-0370",
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    # Used by icu_collections v2.2.0 (transitive via url -> idna ->
    # idna_adapter -> icu_normalizer). Pulled by c2pa -> apohara-sealchain.
    "CC0-1.0",
    "Zlib",
    "MPL-2.0",
    # CDLA-Permissive-2.0: Mozilla's CA root bundle (webpki-roots).
    # Pulled in transitively by reqwest 0.12 + rustls-tls. The
    # license covers the *data* (the root certs), not code; it
    # is functionally a permissive redistribution license. US-08
    # adds this dep.
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "allow"
wildcards = "allow"
highlight = "all"
deny = []
# Copyleft detection lives in [licenses] above via the allow-list
# (MIT/Apache/BSD/etc.) plus confidence-threshold = 0.8 for ambiguous
# transitive deps.
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
