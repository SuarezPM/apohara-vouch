<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Dark navy background per visual-verdict palette -->
  <rect width="1200" height="630" fill="#0a0e1a"/>

  <!-- Top accent strip: gold -->
  <rect x="0" y="0" width="1200" height="8" fill="#d4a017"/>

  <!-- THEMIS wordmark (centered, large) -->
  <text x="600" y="180"
        font-family="Inter, system-ui, -apple-system, sans-serif"
        font-size="120"
        font-weight="900"
        fill="#f9fafb"
        text-anchor="middle"
        letter-spacing="0.1em">THEMIS</text>

  <!-- Subtitle: tagline -->
  <text x="600" y="240"
        font-family="Inter, system-ui, sans-serif"
        font-size="22"
        font-weight="400"
        fill="#9ca3af"
        text-anchor="middle">5 agents · 1 chat room · 1 signed evidence packet · 4 regulators satisfied</text>

  <!-- BAAAR HALT: 10/10 (gold accent) -->
  <g transform="translate(600, 320)">
    <rect x="-180" y="-30" width="360" height="60" rx="8" fill="none" stroke="#d4a017" stroke-width="2"/>
    <text x="0" y="9"
          font-family="JetBrains Mono, ui-monospace, monospace"
          font-size="28"
          font-weight="700"
          fill="#d4a017"
          text-anchor="middle">BAAAR HALT: 10/10</text>
  </g>

  <!-- 5 framework badges in a row -->
  <g font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="600" fill="#f9fafb" text-anchor="middle">
    <g transform="translate(180, 430)">
      <rect x="-65" y="-22" width="130" height="44" rx="4" fill="#10b981" opacity="0.15"/>
      <rect x="-65" y="-22" width="130" height="44" rx="4" fill="none" stroke="#10b981" stroke-width="1.5"/>
      <text y="6">DORA</text>
      <text y="22" font-size="10" font-weight="400" fill="#9ca3af">3/3</text>
    </g>
    <g transform="translate(390, 430)">
      <rect x="-90" y="-22" width="180" height="44" rx="4" fill="#10b981" opacity="0.15"/>
      <rect x="-90" y="-22" width="180" height="44" rx="4" fill="none" stroke="#10b981" stroke-width="1.5"/>
      <text y="6">EU AI Act</text>
      <text y="22" font-size="10" font-weight="400" fill="#9ca3af">9/9</text>
    </g>
    <g transform="translate(630, 430)">
      <rect x="-90" y="-22" width="180" height="44" rx="4" fill="#10b981" opacity="0.15"/>
      <rect x="-90" y="-22" width="180" height="44" rx="4" fill="none" stroke="#10b981" stroke-width="1.5"/>
      <text y="6">NIST AI RMF</text>
      <text y="22" font-size="10" font-weight="400" fill="#9ca3af">4/4</text>
    </g>
    <g transform="translate(870, 430)">
      <rect x="-90" y="-22" width="180" height="44" rx="4" fill="#10b981" opacity="0.15"/>
      <rect x="-90" y="-22" width="180" height="44" rx="4" fill="none" stroke="#10b981" stroke-width="1.5"/>
      <text y="6">OWASP Agentic</text>
      <text y="22" font-size="10" font-weight="400" fill="#9ca3af">10/10</text>
    </g>
  </g>

  <!-- Total: 26/26 -->
  <text x="600" y="500"
        font-family="Inter, system-ui, sans-serif"
        font-size="32"
        font-weight="700"
        fill="#d4a017"
        text-anchor="middle">26/26 fields populated</text>

  <!-- Footer: track + URL -->
  <g font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="400" fill="#9ca3af" text-anchor="middle">
    <text x="600" y="560">Band of Agents Hackathon 2026 · Track 3 — Regulated &amp; High-Stakes</text>
    <text x="600" y="585" font-family="JetBrains Mono, ui-monospace, monospace" font-size="13" fill="#d4a017">themis.apohara.dev</text>
  </g>

  <!-- Bottom accent strip: gold -->
  <rect x="0" y="622" width="1200" height="8" fill="#d4a017"/>
</svg>
