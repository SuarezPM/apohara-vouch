name: CodeQL
on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Weekly run to catch new CVEs against our dep graph.
    - cron: '17 13 * * 1'

permissions:
  contents: read
  security-events: write
  # CodeQL needs id-token for the SARIF upload step.
  id-token: write

jobs:
  analyze:
    name: Analyze (Rust)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: github/codeql-action/init@4e828ff8d448a5a5b0e9eb5cc3e7d2c4b5b8c2c5 # v3
        with:
          languages: rust
      - uses: github/codeql-action/analyze@4e828ff8d448a5a5b0e9eb5cc3e7d2c4b5b8c2c5 # v3
        with:
          category: /language:rust
