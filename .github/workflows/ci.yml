name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt
      - run: cargo fmt --check

  clippy:
    name: clippy (-D warnings)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  deny:
    name: cargo-deny (licenses + advisories)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - name: Install cargo-deny
        run: cargo install --locked cargo-deny
      - run: cargo deny check licenses
      - run: cargo deny check advisories

  # AC17 — supply-chain defense (ASI04). Runs in addition to
  # `deny` (which uses cargo-deny's curated advisory DB). `cargo
  # audit` consults the RustSec Advisory Database directly and
  # pins its action to a known-good commit. Network access
  # required but the action caches the DB so subsequent runs
  # are fast. Runs on PRs from forks (no secret dependency).
  cargo-audit:
    name: cargo audit (RustSec advisories)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: rustsec/audit-action@17a69828de95e6c54e64b8dacde37b86ed00860d # v0.21.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          args: --deny warnings

  # AC17 — formatting drift gate. The legacy `fmt` job above
  # only checks the default workspace member; `--all` walks
  # every member crate so a drift in any of them trips CI.
  cargo-fmt:
    name: cargo fmt --all
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  # AC17 — single-binary release-size cap (30 MB per critic
  # amendment). Builds release binaries and runs the gate
  # script. No secret dependency; runs on PRs from forks.
  binary-size:
    name: binary size ≤ 30 MB
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Build release binaries
        run: cargo build --release --workspace --bins
      - name: Enforce 30 MB cap
        run: bash scripts/check-binary-size.sh

  ac11:
    name: AC11 guard (no apohara_* imports)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - run: bash scripts/check-no-apohara.sh

  pre-commit:
    name: pre-commit hook integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - name: Install cargo-deny
        run: cargo install --locked cargo-deny
      - run: bash scripts/pre-commit.sh

  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: cargo test --workspace
        run: cargo test --workspace --all-targets

  # Python agent tests + cross-account Compliance Veto chaos
  # harness. The chaos harness (test_compliance_fallback_chaos.py)
  # is the audit-flagged differentiator: BAAAR fallback fires 10/10
  # over 3-kill scenarios, deterministic. No network — every Band
  # / LLM call is mocked at the test boundary.
  python-tests:
    name: python agents + compliance veto chaos (ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-python@a26af6df68f1c9f3812227baa4f9c2e6a1f10c7e # v5.0.0
        with:
          python-version: "3.13"
      - name: Install uv (Python package manager)
        run: pip install uv
      - name: Sync vouch-agents deps via uv
        working-directory: crates/vouch-agents
        run: uv sync --frozen
      - name: Run pytest (181 agent tests, excludes @pytest.mark.chaos)
        working-directory: crates/vouch-agents
        run: .venv/bin/python -m pytest tests/ -v --tb=short -m "not chaos"
      - name: Run compliance veto chaos harness (10/10 deterministic)
        working-directory: crates/vouch-agents
        run: .venv/bin/python -m pytest tests/ -v --tb=short -m chaos

  live-deploy:
    name: live deploy smoke test
    runs-on: ubuntu-latest
    # Only on main, after the rest of CI passes.
    needs: [fmt, clippy, deny, cargo-audit, cargo-fmt, binary-size, ac11, test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: GET themis.apohara.dev
        run: curl -s -o /dev/null -w "HTTP %{http_code} | %{time_total}s\n" https://themis.apohara.dev/
      - name: POST /invoices via Vercel proxy
        run: |
          curl -s -X POST https://themis.apohara.dev/invoices \
            -H "Content-Type: application/json" \
            -d '{"tenant_id":"stark","invoice_id":"ci-smoke","raw_b64":""}' \
            -w "\nHTTP %{http_code} | %{time_total}s\n"
      - name: GET /packets/:id/pdf via Vercel proxy
        run: |
          RESP=$(curl -s -X POST https://themis.apohara.dev/invoices \
            -H "Content-Type: application/json" \
            -d '{"tenant_id":"wayne","invoice_id":"ci-pdf-smoke","raw_b64":""}')
          PID=$(echo "$RESP" | python3 -c "import json,sys; print(json.load(sys.stdin)['packet_id'])")
          curl -s -o /tmp/ci.pdf https://themis.apohara.dev/packets/$PID/pdf \
            -w "PDF: HTTP %{http_code} | %{time_total}s | %{size_download} bytes\n"
          file /tmp/ci.pdf
