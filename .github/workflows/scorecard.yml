name: Scorecard
on:
  push:
    branches: [main]
  schedule:
    # Weekly run to track supply-chain posture over time.
    - cron: '17 6 * * 1'

permissions:
  contents: read
  # Scorecard needs to write the SARIF results back to the repo's
  # code-scanning dashboard.
  security-events: write
  actions: read

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    steps:
      - name: 'Checkout code'
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: 'Run analysis'
        uses: ossf/scorecard-action@05c7c5c3ff86de03b04e3e5b2529974e5fd7a3ec # v2.4.1
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true
        env:
          # GitHub PAT is auto-provided by scorecard-action.
          SCORECARD_APIARGS: '--repo=github.com/SuarezPM/apohara-themis'

      - name: 'Upload results'
        if: always()
        uses: github/codeql-action/upload-sarif@4e828ff8d448a5a5b0e9eb5cc3e7d2c4b5b8c2c5 # v3
        with:
          sarif_file: results.sarif
          category: scorecard
