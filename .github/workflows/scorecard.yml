name: Scorecard
on:
  push:
    branches: [main]
  schedule:
    # Weekly run to track supply-chain posture over time.
    # The schedule cron uses UTC; 11 11 = Friday 11:11 UTC.
    - cron: '11 11 * * 5'

permissions:
  contents: read
  # Scorecard needs to write the SARIF results back to the repo's
  # code-scanning dashboard (the security-events permission).
  security-events: write
  # Required for scorecard-action to publish results to the API.
  actions: read

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    # The scorecard-action uses a PAT (auto-provided by GitHub
    # when the job has `actions: read`) to call api.securityscorecards.dev.
    # SARIF results are uploaded via the `github/codeql-action/upload-sarif`
    # step below, which needs `security-events: write`.
    steps:
      - name: 'Checkout code'
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: 'Run analysis'
        uses: ossf/scorecard-action@05c7c5c3ff86de03b04e3e5b2529974e5fd7a3ec # v2.4.1
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true
        env:
          # The GITHUB_TOKEN env is auto-provided by GitHub Actions
          # to authenticated requests; scorecard-action uses it
          # against api.securityscorecards.dev.
          GITHUB_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 'Upload SARIF'
        if: always()
        uses: github/codeql-action/upload-sarif@4e828ff8d448a5a5b0e9eb5cc3e7d2c4b5b8c2c5 # v3
        with:
          sarif_file: results.sarif
          category: scorecard
