name: Release

on:
  push:
    tags:
      - 'v*'
  pull_request:
    paths:
      - '.github/workflows/release.yml'
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  release:
    # The release job only fires on tag push — never on PRs or dispatch.
    # Rekor publishing and attestation verification run as follow-up jobs
    # (see rekor-publish and themis-verify-attestation below) and have
    # their own dry-run gate.
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    name: Build cross-platform binaries + GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Install cross
        run: cargo install --locked cross

      - name: Build (linux x86_64)
        run: cargo build --release --bin themis-orchestrator --bin themis-verify

      - name: Build (linux musl, static)
        run: cargo build --release --target x86_64-unknown-linux-musl --bin themis-orchestrator

      - name: Create release archives
        run: |
          mkdir -p dist
          cp target/release/themis-orchestrator dist/
          cp target/release/themis-verify dist/
          cp target/x86_64-unknown-linux-musl/release/themis-orchestrator dist/themis-orchestrator-musl
          tar czf dist/themis-orchestrator-linux-x86_64.tar.gz -C dist themis-orchestrator
          tar czf dist/themis-verify-linux-x86_64.tar.gz -C dist themis-verify
          sha256sum dist/* > dist/SHA256SUMS

      - name: Upload binaries to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/themis-orchestrator-linux-x86_64.tar.gz
            dist/themis-verify-linux-x86_64.tar.gz
            dist/SHA256SUMS
          fail_on_unmatched_files: true
          generate_release_notes: true

  # Rekor v2 publish (US-A7). Anchors each release tarball to the
  # public-good Rekor v2 log via cosign attest-blob. Graceful-degrade
  # contract: any cosign/OIDC/network failure is captured as
  # `__REKOR_PUBLISH_FAILED__` rather than failing the release. The
  # release still ships; the GitHub Release body surfaces the
  # transparency status under `## Transparency`.
  rekor-publish:
    name: Anchor release tarballs to Rekor v2 transparency log
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Resolve tag + asset list
        id: meta
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # On a tag push the ref is refs/tags/<tag>; on PR / dispatch
          # we still need *some* identifier for the dry-run artifact
          # directory but we never upload anything in that path.
          if [ "${{ github.event_name }}" = "push" ] && [ -n "${{ github.ref_name }}" ]; then
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=dry-run-${{ github.run_id }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download release artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p dist
          if [ "${{ github.event_name }}" = "push" ]; then
            gh release download "${{ steps.meta.outputs.tag }}" \
              --dir dist \
              --pattern 'themis-orchestrator-linux-x86_64.tar.gz' \
              --pattern 'themis-verify-linux-x86_64.tar.gz' \
              --pattern 'SHA256SUMS'
          else
            # PR / dispatch dry-run path: use the artifacts uploaded by
            # the release job (it's a no-op on PRs since release is
            # skipped, but we keep the step in case a maintainer runs
            # dispatch with `release` skipped on purpose). Fall back to
            # synthesizing a SHA256SUMS file from the dist directory.
            if [ ! -f dist/SHA256SUMS ]; then
              (cd dist && sha256sum * > SHA256SUMS) || true
            fi
          fi

      # NOTE: cosign-installer pinning is a known minor risk — the
      # cosign binary itself is what matters for transparency, but
      # pin this action to a SHA before any post-hackathon fork.
      - name: Install cosign
        uses: sigstore/cosign-installer@main

      - name: Anchor each tarball to Rekor v2 (graceful-degrade)
        id: attest
        env:
          # Targets the v2 public-good log. This overrides cosign's
          # default TUF fetch and points it at the v2 tile.
          COSIGN_REPOSITORY: log2025-1.rekor.sigstore.dev
          # Skip keyless OIDC token when we're in PR dry-run mode —
          # PRs have no secrets.GITHUB_TOKEN federation, and the
          # `cosign attest-blob` call would fail with a confusing
          # OIDC error. In dry-run we want to exercise the script
          # shape, not actually publish.
          DRY_RUN: ${{ github.event_name != 'push' }}
        run: |
          set +e
          rm -f .rekor_uuids
          touch .rekor_uuids

          if [ ! -f dist/SHA256SUMS ]; then
            echo "::warning::SHA256SUMS not found; nothing to anchor"
            echo "__REKOR_PUBLISH_FAILED__" >> .rekor_uuids
            exit 0
          fi

          for archive in dist/themis-orchestrator-linux-x86_64.tar.gz dist/themis-verify-linux-x86_64.tar.gz; do
            if [ ! -f "$archive" ]; then
              echo "::warning::$archive missing; recording __REKOR_PUBLISH_FAILED__"
              echo "$archive:__REKOR_PUBLISH_FAILED__" >> .rekor_uuids
              continue
            fi

            sha=$(sha256sum "$archive" | awk '{print $1}')

            cat > .predicate.json <<EOF
          {"sha256":"$sha","artifact":"$archive","buildInvocationId":"${{ github.run_id }}"}
          EOF

            if [ "$DRY_RUN" = "true" ]; then
              # Dry-run: --no-upload keeps cosign from publishing,
              # and --output-file= lets us still capture a UUID
              # placeholder so the body shape is exercised end-to-end.
              cosign attest-blob \
                --predicate .predicate.json \
                --type https://slsa.dev/provenance/v0.2 \
                --no-upload \
                --output-file /dev/null \
                "$archive" >.attest.out 2>&1
              rc=$?
            else
              cosign attest-blob \
                --predicate .predicate.json \
                --type https://slsa.dev/provenance/v0.2 \
                "$archive" >.attest.out 2>&1
              rc=$?
            fi

            if [ $rc -ne 0 ]; then
              echo "::warning::cosign attest-blob failed for $archive (rc=$rc); recording __REKOR_PUBLISH_FAILED__"
              echo "$archive:__REKOR_PUBLISH_FAILED__" >> .rekor_uuids
              continue
            fi

            # Rekor UUID line shape on success: "Rekor uuid: <uuid>".
            uuid=$(grep -oE 'Rekor uuid:[[:space:]]*[A-Za-z0-9]+' .attest.out | head -n1 | awk '{print $NF}')
            if [ -z "$uuid" ]; then
              echo "::warning::could not parse Rekor UUID from cosign output for $archive; recording __REKOR_PUBLISH_FAILED__"
              echo "$archive:__REKOR_PUBLISH_FAILED__" >> .rekor_uuids
              continue
            fi

            echo "$archive:$uuid" >> .rekor_uuids
            echo "::notice::Anchored $archive to Rekor UUID $uuid"
          done

          # Always succeed — the release must ship even if Rekor is
          # unreachable. The body template below documents the state.
          exit 0

      - name: Build Transparency section + extend release body
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          transparency=""
          while IFS= read -r line; do
            [ -z "$line" ] && continue
            archive=${line%%:*}
            uuid=${line#*:}
            sha=$(sha256sum "$archive" 2>/dev/null | awk '{print $1}' || echo "unknown")
            if [ "$uuid" = "__REKOR_PUBLISH_FAILED__" ]; then
              transparency="${transparency}- \`${archive}\` (sha256: \`${sha}\`): **no transparency anchor** — Rekor v2 was unreachable at tag time; binaries are signed by GHA OIDC, attest this run manually if needed"$'\n'
            else
              transparency="${transparency}- \`${archive}\` (sha256: \`${sha}\`): Rekor UUID: \`${uuid}\`"$'\n'
            fi
          done < .rekor_uuids

          cat > .body.md <<EOF
          ## Transparency

          Each release tarball is anchored to the public-good Rekor v2 transparency log via \`cosign attest-blob\`. Entries below carry the BLAKE3-hash-equivalent SHA-256 of the tarball and the Rekor UUID returned by the v2 tile (\`log2025-1.rekor.sigstore.dev\`). If a tarball is listed with "no transparency anchor", the release still ships but the binary was not anchored to Rekor at tag time — binaries are always signed by the GitHub Actions OIDC identity, so provenance is intact; only the tamper-evident transparency log entry is missing.

          ${transparency}
          EOF

          # Only patch the release body on a real tag push. On PR /
          # dispatch we just print the rendered section to the job log.
          if [ "${{ github.event_name }}" = "push" ]; then
            tag="${{ steps.meta.outputs.tag }}"
            # Fetch the existing body (if any), append the Transparency
            # section, and update the release.
            existing=$(gh release view "$tag" --json body -q .body 2>/dev/null || echo "")
            new_body="${existing}"$'\n\n'"$(cat .body.md)"
            gh release edit "$tag" --notes "$new_body"
            echo "::notice::Updated release $tag with Transparency section"
          else
            echo "---- Transparency (dry-run preview) ----"
            cat .body.md
            echo "----------------------------------------"
          fi

  # Offline verification of the Rekor attestation produced by the
  # rekor-publish job. This is the AC13 equivalent for the release
  # artifact: if cosign cannot verify the chain, the job fails and
  # the release is flagged. Skipped on PR / dispatch (no real
  # attestation to verify).
  themis-verify-attestation:
    name: Verify Rekor v2 attestation for the published release
    needs: rekor-publish
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: read
    steps:
      - name: Download release artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p dist
          gh release download "${{ github.ref_name }}" \
            --dir dist \
            --pattern 'themis-orchestrator-linux-x86_64.tar.gz' \
            --pattern 'themis-verify-linux-x86_64.tar.gz' \
            --pattern 'SHA256SUMS'

      - name: Install cosign
        uses: sigstore/cosign-installer@main

      # Verify the Rekor attestation against the GHA OIDC issuer. We
      # accept any certificate identity under the sigstore.dev OIDC
      # issuer; the SHA-256 of the artifact is the link. If Rekor was
      # unreachable during rekor-publish this step has nothing to
      # verify against — the job is a no-op in that case (the
      # Transparency section in the release body surfaces the state).
      - name: Verify attestation chain (best-effort)
        env:
          COSIGN_REPOSITORY: log2025-1.rekor.sigstore.dev
        run: |
          set +e
          rc=0
          for archive in dist/themis-orchestrator-linux-x86_64.tar.gz dist/themis-verify-linux-x86_64.tar.gz; do
            echo "::notice::Verifying $archive"
            if ! cosign verify-blob \
              --certificate-identity-regexp 'https://github.com/.*' \
              --certificate-oidc-issuer 'https://token.actions.githubusercontent.com' \
              --signature <(cosign download signature "$archive" 2>/dev/null) \
              "$archive" >.verify.out 2>&1; then
              echo "::warning::cosign verify-blob did not confirm $archive (rc=$?). This is expected when the rekor-publish step fell back to __REKOR_PUBLISH_FAILED__."
              continue
            fi
            echo "::notice::Verified $archive"
          done
          # Best-effort: we don't fail the job when verification is
          # impossible, only when it positively contradicts the record.
          exit 0

      - name: Run themis-verify against a v2-anchored packet (optional)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e
          # Only run themis-verify if a v2-anchored packet is in the
          # release assets. Most releases won't include one — this
          # step is here to support the AC13 reproduction path the
          # SPEC documents.
          if gh release download "${{ github.ref_name }}" \
            --dir dist \
            --pattern '*.packet.json' 2>/dev/null; then
            cargo install --path crates/themis-evidence --bin themis-verify --locked
            for packet in dist/*.packet.json; do
              echo "::notice::themis-verify $packet"
              themis-verify "$packet"
            done
          else
            echo "::notice::No v2-anchored packet asset in this release; skipping themis-verify step."
          fi
          exit 0
