name: Publish to crates.io
on:
  workflow_dispatch:
    inputs:
      crate:
        description: 'Which crate to publish (workspace member name)'
        required: true
        type: choice
        options:
          - themis-evidence
          - themis-compliance
          - themis-orchestrator
          - themis-agents
          - themis-band-client
      dry_run:
        description: 'Dry run (cargo publish --dry-run)'
        required: false
        default: 'true'
        type: boolean

permissions:
  contents: read
  # OIDC trusted publishing: the crates.io API trusts this GitHub
  # workflow identity. No CARGO_REGISTRY_TOKEN is required once
  # the maintainer has activated Trusted Publishing on crates.io
  # (one-time setup at https://crates.io/settings/Trusted-Publishing).
  id-token: write

jobs:
  publish:
    name: publish ${{ inputs.crate }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Verify metadata
        working-directory: crates/${{ inputs.crate }}
        run: |
          cargo read-manifest 2>/dev/null || cat Cargo.toml
          test -f README.md || echo "::warning::No README.md in this crate"

      # Always dry-run first. If trusted publishing is not
      # configured on crates.io, this is what will fail.
      - name: Dry-run
        working-directory: crates/${{ inputs.crate }}
        run: cargo publish --dry-run --locked

      # Live publish is gated on the `dry_run` input (default
      # true = dry-run-only). Once trusted publishing is set up
      # on crates.io, the maintainer can re-run with
      # dry_run=false.
      - name: Publish
        if: inputs.dry_run == 'false'
        working-directory: crates/${{ inputs.crate }}
        run: cargo publish --locked
